<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle Ticket #{{ ticket.id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width: 600px;">
    <h2 class="mb-4">Ticket #{{ ticket.id }}</h2>
    <div class="card p-4 mb-4">
        <p><strong>Cliente:</strong> {{ ticket.cliente }}</p>
        <p><strong>Descripción:</strong> {{ ticket.descripcion }}</p>
        <p><strong>Prioridad:</strong> {{ ticket.prioridad }}</p>
        <p><strong>Fecha creación:</strong> {{ ticket.fecha.strftime('%d/%m/%Y %H:%M') }}</p>
    </div>
    <div class="card p-4">
        <h5 class="mb-3">Gestión del ticket</h5>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Técnico asignado</label>
                <input type="text" name="tecnico" class="form-control"
                       value="{{ ticket.tecnico }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha y hora de visita</label>
                <input type="datetime-local" name="fecha_visita" class="form-control"
                       value="{{ ticket.fecha_visita.strftime('%Y-%m-%dT%H:%M') if ticket.fecha_visita else '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                    <option value="abierto" {% if ticket.estado == 'abierto' %}selected{% endif %}>Abierto</option>
                    <option value="en proceso" {% if ticket.estado == 'en proceso' %}selected{% endif %}>En proceso</option>
                    <option value="cerrado" {% if ticket.estado == 'cerrado' %}selected{% endif %}>Cerrado</option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Guardar cambios</button>
                <a href="/" class="btn btn-outline-secondary">Volver</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
